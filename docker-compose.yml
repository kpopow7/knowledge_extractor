services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      RAG_STORAGE_ROOT: /data
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_API_KEYS: ${RAG_API_KEYS:-}
      RAG_API_CORS_ORIGINS: ${RAG_API_CORS_ORIGINS:-}
      RAG_API_LOG_LEVEL: ${RAG_API_LOG_LEVEL:-INFO}
      RAG_S3_BUCKET: ${RAG_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
    volumes:
      - rag_data:/data

  worker:
    build: .
    command: python -m rag_worker.worker
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      REDIS_URL: redis://redis:6379/0
      RAG_STORAGE_ROOT: /data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      RAG_INDEX_FAKE_EMBEDDINGS: ${RAG_INDEX_FAKE_EMBEDDINGS:-}
      RAG_API_LOG_LEVEL: ${RAG_API_LOG_LEVEL:-INFO}
      RAG_S3_BUCKET: ${RAG_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
    volumes:
      - rag_data:/data

volumes:
  rag_data:
  redis_data:
  pg_data:
