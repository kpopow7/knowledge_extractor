name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Eval gate (fixed fixture, fake embeddings)
        run: python -m rag_eval gate --workspace fixtures/eval/ci
        env:
          RAG_INDEX_FAKE_EMBEDDINGS: "1"
